[options]
    logfile = /var/log/knockd.log
    interface = eth0

[opencloseSSH]
    sequence        = 7000:udp,8000:udp,9000:udp
    seq_timeout     = 15
    tcpflags        = syn
    start_command   = /sbin/iptables -I INPUT -s %IP% -p tcp --dport 22 -j ACCEPT
    cmd_timeout     = 10
    stop_command    = /sbin/iptables -D INPUT -s %IP% -p tcp --dport 22 -j ACCEPT